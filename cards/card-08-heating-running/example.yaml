type: custom:mushroom-template-card
entity: climate.wiser_office
primary: Office
icon: mdi:radiator-off
icon_color: >-
  {{ 'orange' if is_state_attr('climate.wiser_office', 'is_heating', true) else
  'grey' }}
card_mod:
  style: |
    ha-state-icon {
      {% if is_state_attr('climate.wiser_office', 'is_heating', true) %}
        animation: radiator-swap 2s steps(1) infinite;
      {% else %}
        --card-mod-icon: mdi:radiator-off;
        filter: none;
      {% endif %}
    }
    @keyframes radiator-swap {
      0% { --card-mod-icon: mdi:radiator; filter: drop-shadow(0 0 8px rgba(255, 140, 0, 0.9)) drop-shadow(0 0 16px rgba(255, 140, 0, 0.6)); }
      50% { --card-mod-icon: mdi:radiator-disabled; filter: drop-shadow(0 0 20px rgba(255, 140, 0, 1)) drop-shadow(0 0 35px rgba(255, 140, 0, 0.8)) drop-shadow(0 0 50px rgba(255, 140, 0, 0.4)); }
    }
grid_options:
  columns: full
