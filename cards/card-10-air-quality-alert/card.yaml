type: custom:mushroom-template-card
entity: [SENSOR.AIR_QUALITY_MONITOR_NAME]
primary: Air Quality
secondary: >
  {{ states('SENSOR.AIR_QUALITY_MONITOR_CARBON_DIOXIDE') }} ppm |  {{
  states('SENSOR.AIR_QUALITY_MONITOR_HUMIDITY') }}% | {{
  states('SENSOR.AIR_QUALITY_MONITOR_TEMPERATURE') }}°C
icon: mdi:molecule-co2
icon_color: >
  {% set co2 = states(config.entity) | float(0) %} {% if co2 < 800 %} green {%
  elif co2 < 1200 %} orange {% else %} red {% endif %}
card_mod:
  style: |
    ha-state-icon {
      {% set co2 = states(config.entity) | float(0) %}
      transform-origin: center;
      animation: {{ 'pulse 3s ease-in-out infinite' if co2 >= 800 else 'none' }};
      {% if co2 >= 1200 %}
        animation-duration: 1s;
      {% endif %}
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
grid_options:
  columns: full
