template:
  - trigger:
      - platform: state
        entity_id: [SENSOR.ENTITY_NAME] #The entity of the power sensor for the appliance/smart plug
    sensor:
      - name: washing_machine_speed
        state: >
          {% set power = states('SENSOR.ENTITY_NAME') | float(0) %}
          {% if power > 1000 %}0.5
          {% elif power > 300 %}1.5
          {% elif power > 50 %}3
          {% else %}5
          {% endif %} 
